[custom]

; --- 0.最高 优先级
custom_rule=DSCP,46,💧 外汇交易

; --- 1. 规则集 ---

; 1.1 高优先级：走代理
ruleset=💧 外汇交易,snippets/exchange.list,list
ruleset=🧲 binance,snippets/Binance.list,list
ruleset=💎 Gemini,snippets/Gemini.list,list
ruleset=🤖 AI,snippets/AI.list,list
ruleset=📹 YouTube,snippets/YouTube.list,list
ruleset=📲 Telegram,snippets/Telegram.list,list
ruleset=📘 GitHub,snippets/GitHub.list,list
ruleset=🕊️ Twitter(X),snippets/Twitter.list,list
ruleset=🍀 Google,snippets/Google.list,list

; 1.2 中优先级：
ruleset=💼 生产力,snippets/Upwork.list,list
ruleset=🍎 Apple,snippets/Apple.list,list
ruleset=Ⓜ️ Microsoft,snippets/Microsoft.list,list
ruleset=🕹️ Game,snippets/Epic.list,list

; 1.3 低优先级：无墙外网与国内
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; 1.4 被墙的外网
ruleset=🐟 漏网之鱼,[]FINAL

; --- 2. 核心业务策略组 ---
custom_proxy_group=💧 外汇交易`select`[]🔯 香港故转`[]🔯 加坡故转`[]🔯 日本故转`[]香港-自动`[]台湾-自动`[]日本-自动`[]加坡-自动`[]美国-自动`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🧲 binance`select`[]🔯 加坡故转`[]🔯 日本故转`[]日本-自动`[]加坡-自动`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT
custom_proxy_group=💎 Gemini`select`[]香港-自动`[]🔯 加坡故转`[]🔯 美国故转`[]🔯 日本故转`[]台湾-自动`[]日本-自动`[]加坡-自动`[]美国-自动`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🤖 AI`select`[]🔯 加坡故转`[]🔯 美国故转`[]🔯 日本故转`[]香港-自动`[]台湾-自动`[]日本-自动`[]加坡-自动`[]美国-自动`[]🐸 手动切换`[]DIRECT
custom_proxy_group=📹 YouTube`select`[]加坡-自动`[]香港-自动`[]台湾-自动`[]日本-自动`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT
custom_proxy_group=📘 GitHub`select`[]🔯 日本故转`[]🔯 美国故转`[]🔯 加坡故转`[]🔯 湾湾故转`[]香港-自动`[]日本-自动`[]加坡-自动`[]美国-自动`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🕊️ Twitter(X)`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]加坡-自动`[]美国-自动`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT
custom_proxy_group=📲 Telegram`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]加坡-自动`[]美国-自动`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT
custom_proxy_group=💼 生产力`select`[]🔯 美国故转`[]🔯 加坡故转`[]美国-自动`[]加坡-自动`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🔯 日本故转`[]🔯 香港故转`[]🔯 加坡故转`[]🔯 湾湾故转`[]🔯 美国故转`[]♻️ 自动选择`[]🐸 手动切换
custom_proxy_group=Ⓜ️ Microsoft`select`[]DIRECT`[]🔯 日本故转`[]🔯 香港故转`[]🔯 加坡故转`[]🔯 湾湾故转`[]🔯 美国故转`[]♻️ 自动选择`[]🐸 手动切换
custom_proxy_group=🕹️ Game`select`[]DIRECT`[]🔯 日本故转`[]🔯 香港故转`[]🔯 加坡故转`[]香港-自动`[]日本-自动`[]加坡-自动`[]美国-自动`[]♻️ 自动选择`[]🐸 手动切换
custom_proxy_group=🍀 Google`select`[]日本-自动`[]美国-自动`[]香港-自动`[]加坡-自动`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]♻️ 自动选择`[]🐸 手动切换
custom_proxy_group=🐟 漏网之鱼`select`[]香港-自动`[]日本-自动`[]加坡-自动`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT

; --- 3. 节点处理 (正则与自动优选) ---
custom_proxy_group=🐸 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`180,50,100

custom_proxy_group=🔯 湾湾故转`fallback`(?=.*(台湾|TaiWan|Taiwan|TW|湾|台北))^((?!(剩余|流量|倍|x)).)*$`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🔯 香港故转`fallback`(?=.*(香港|HK|Hong Kong|🇭🇰|HongKong))^((?!(深港|家宽|游戏|剩余|流量|倍|x)).)*$`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🔯 日本故转`fallback`(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!(深港|家宽|游戏|剩余|流量|倍|x)).)*$`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🔯 加坡故转`fallback`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(家宽|游戏|剩余|流量|倍|x)).)*$`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🔯 美国故转`fallback`(?=.*(美|波特兰|达拉斯|硅谷|洛杉矶|西雅图|芝加哥|US|United States))^((?!(流量|倍|x)).)*$`http://www.gstatic.com/generate_204`300,,100

custom_proxy_group=香港-自动`url-test`(广港|香港|HK|Hong Kong|🇭🇰|HongKong)`http://www.gstatic.com/generate_204`180,50,100
custom_proxy_group=台湾-自动`url-test`(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)`http://www.gstatic.com/generate_204`180,50,100
custom_proxy_group=日本-自动`url-test`(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)`http://www.gstatic.com/generate_204`180,50,100
custom_proxy_group=加坡-自动`url-test`(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)`http://www.gstatic.com/generate_204`180,50,100
custom_proxy_group=美国-自动`url-test`(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)`http://www.gstatic.com/generate_204`180,50,100

enable_rule_generator=true
overwrite_original_rules=true